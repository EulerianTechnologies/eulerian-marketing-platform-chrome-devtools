<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eulerian Marketing Platform Chrome DevTools</title>
<style>
  :root {
    --bg:       #FFFFFF;
    --bg2:      #F5F7FA;
    --bg3:      #EEF1F8;
    --bg4:      #E4E8F5;
    --border:   rgba(0,0,0,.09);
    --border2:  rgba(0,0,0,.16);
    --accent:   #0055FF;
    --accent-h: #003ECC;
    --accent-t: #0044CC;
    --accent-d: rgba(0,85,255,.07);
    --accent-d2:rgba(0,85,255,.14);
    --ok:       #0A7040;
    --ok-bg:    #EDF7F2;
    --ok-b:     rgba(10,112,64,.18);
    --wa:       #884400;
    --wa-bg:    #FFF7ED;
    --wa-b:     rgba(136,68,0,.18);
    --er:       #B91C1C;
    --er-bg:    #FEF2F2;
    --er-b:     rgba(185,28,28,.18);
    --text:     #0D1B3E;
    --text2:    #3D4F72;
    --text3:    #7A88A8;
    --mono:     'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    --r:        6px;
    --r-sm:     4px;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg2);
    font-family: var(--sans);
    color: var(--text);
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    padding: 12px 14px 10px;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 10px;
  }
  .logo {
    width: 28px; height: 28px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img { width: 28px; height: 28px; display: block; }
  .header-name {
    font-size: 12px; font-weight: 600; color: var(--text);
    letter-spacing: -.01em; line-height: 1.2;
  }
  .header-ver { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .site-pill {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    background: var(--bg3); border: 1px solid var(--border2);
    padding: 3px 8px; border-radius: 20px; color: var(--text2);
    max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    gap: 2px;
  }
  .nav-tab {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 7px 8px 6px;
    font-size: 11px; font-weight: 500; color: var(--text3);
    cursor: pointer;
    border-radius: var(--r-sm);
    border: 1px solid transparent;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .nav-tab:hover { background: var(--bg3); color: var(--text2); }
  .nav-tab.active {
    background: var(--accent-d);
    color: var(--accent-t);
    border-color: var(--accent-d2);
    font-weight: 600;
  }
  .nav-tab .tab-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0;
  }
  .nav-tab.active .tab-dot { background: var(--ok); }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 24px;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Toolbar row ── */
  .toolbar {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 12px;
  }
  .btn-primary {
    display: flex; align-items: center; gap: 5px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--r-sm);
    padding: 6px 13px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
    transition: background .12s;
  }
  .btn-primary:hover { background: var(--accent-h); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost {
    background: var(--bg); border: 1px solid var(--border2);
    color: var(--text2); border-radius: var(--r-sm);
    padding: 6px 11px; font-size: 11px;
    cursor: pointer; font-family: var(--sans);
    transition: background .12s;
  }
  .btn-ghost:hover { background: var(--bg3); }
  .btn-sm { padding: 4px 9px; font-size: 10px; }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Status badges ── */
  .status-bar { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 20px; border: 1px solid transparent;
  }
  .badge-ok   { background: var(--ok-bg);  color: var(--ok); border-color: var(--ok-b); }
  .badge-warn { background: var(--wa-bg);  color: var(--wa); border-color: var(--wa-b); }
  .badge-err  { background: var(--er-bg);  color: var(--er); border-color: var(--er-b); }
  .badge-info { background: var(--accent-d); color: var(--accent-t); border-color: var(--accent-d2); }
  .badge-dot  { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

  /* ── Sections ── */
  .section { margin-bottom: 8px; }
  .sec-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r) var(--r) 0 0;
    cursor: pointer;
    user-select: none;
    box-shadow: var(--shadow);
    transition: background .1s;
  }
  .sec-head:hover { background: var(--bg3); }
  .sec-head.collapsed { border-radius: var(--r); }
  .sec-left  { display: flex; align-items: center; gap: 7px; }
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text); }
  .sec-icon  { font-size: 12px; line-height: 1; }
  .sec-right { display: flex; align-items: center; gap: 6px; }
  .sec-status { font-size: 10px; }
  .sec-chevron {
    font-size: 10px; color: var(--text3);
    transition: transform .18s;
    line-height: 1;
  }
  .sec-chevron.open { transform: rotate(180deg); }
  .sec-body {
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--r) var(--r);
    padding: 9px 11px;
  }

  /* ── Data rows ── */
  .d-row {
    display: flex; gap: 8px; align-items: baseline;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .d-row:last-child { border-bottom: none; }
  .d-key { color: var(--text3); min-width: 148px; flex-shrink: 0; font-size: 10.5px; }
  .d-val { font-family: var(--mono); font-size: 10px; color: var(--text); word-break: break-all; flex: 1; }
  .d-val.ok   { color: var(--ok); }
  .d-val.err  { color: var(--er); }
  .d-val.warn { color: var(--wa); }
  .d-val.info { color: var(--accent-t); }

  /* ── TC String box ── */
  .tc-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 7px 40px 7px 9px;
    font-family: var(--mono); font-size: 10px; color: var(--text2);
    word-break: break-all; line-height: 1.55; margin: 5px 0;
    position: relative;
  }
  .copy-btn {
    position: absolute; top: 5px; right: 6px;
    background: var(--bg); border: 1px solid var(--border2);
    color: var(--text2); border-radius: 3px;
    padding: 2px 7px; font-size: 10px; cursor: pointer;
    transition: background .1s;
  }
  .copy-btn:hover { background: var(--bg4); }

  /* ── Purposes grid ── */
  .purposes-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 4px; margin-top: 6px;
  }
  .p-cell {
    padding: 5px 3px; border-radius: var(--r-sm);
    font-size: 10px; text-align: center;
    border: 1px solid var(--border);
    background: var(--bg2);
  }
  .p-cell .p-num { font-weight: 600; font-family: var(--mono); color: var(--text3); }
  .p-cell .p-st  { font-size: 8px; margin-top: 1px; color: var(--text3); }
  .p-cell.on  { border-color: var(--ok-b); background: var(--ok-bg); }
  .p-cell.on .p-num, .p-cell.on .p-st { color: var(--ok); }
  .p-cell.off { opacity: .4; }

  /* ── Cookie table ── */
  .ck-table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  .ck-table th {
    text-align: left; padding: 5px 7px;
    color: var(--text3); font-weight: 500; font-size: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .ck-table td {
    padding: 4px 7px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ck-table td.ck-name { color: var(--accent-t); width: 140px; }
  .ck-table td.ck-val  { color: var(--text2); }
  .ck-table tr.tc-row td { background: var(--accent-d); }
  .ck-table tr:last-child td { border-bottom: none; }

  /* ── Network subsection ── */
  .net-sub {
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-top: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .net-sub-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 11px;
    background: var(--bg);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .net-sub-head:hover { background: var(--bg3); }
  .net-sub-head.collapsed { border-bottom: none; }
  .net-sub-title { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; flex: 1; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  .net-count { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; background: var(--accent-d); color: var(--accent-t); border: 1px solid var(--accent-d2); }
  .net-body { background: var(--bg2); padding: 8px 10px; max-height: 480px; overflow-y: auto; }
  .net-empty { text-align: center; padding: 24px 12px; color: var(--text3); font-size: 11px; line-height: 1.7; }

  /* ── Call cards ── */
  .n-call { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; box-shadow: var(--shadow); overflow: hidden; }
  .n-call:last-child { margin-bottom: 0; }
  .n-call-head { display: flex; align-items: center; gap: 5px; padding: 7px 9px; cursor: pointer; transition: background .1s; }
  .n-call-head:hover { background: var(--bg3); }
  .m-pill { font-size: 9px; font-weight: 700; font-family: var(--mono); padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
  .m-get    { background: var(--accent-d);  color: var(--accent-t); }
  .m-post   { background: var(--wa-bg);     color: var(--wa); }
  .tp-pill  { font-size: 9px; font-weight: 600; font-family: var(--mono); padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
  .tp-image { background: #F5F0FF; color: #6B21A8; }
  .tp-beacon{ background: var(--wa-bg); color: var(--wa); }
  .tp-xhr   { background: var(--accent-d); color: var(--accent-t); }
  .tp-fetch { background: var(--ok-bg); color: var(--ok); }
  .n-url  { font-family: var(--mono); font-size: 10px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .st-pill { font-size: 9px; font-weight: 600; font-family: var(--mono); padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
  .st-ok  { background: var(--ok-bg); color: var(--ok); }
  .st-err { background: var(--er-bg); color: var(--er); }
  .tc-pill { font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
  .tc-ok   { background: var(--ok-bg);  color: var(--ok); }
  .tc-fail { background: var(--er-bg);  color: var(--er); }
  .tc-none { background: var(--bg3);    color: var(--text3); }
  .n-call-body { padding: 8px 9px; border-top: 1px solid var(--border); display: none; background: var(--bg2); }
  .n-call-body.open { display: block; }
  .np-row { display: flex; gap: 5px; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 11px; align-items: baseline; }
  .np-row:last-child { border-bottom: none; }
  .np-k { color: var(--text3); min-width: 152px; flex-shrink: 0; font-size: 10px; font-family: var(--mono); }
  .np-v { font-family: var(--mono); font-size: 10px; word-break: break-all; flex: 1; }
  .np-v.ok   { color: var(--ok); }
  .np-v.err  { color: var(--er); }
  .np-v.info { color: var(--accent-t); }
  .np-v.dim  { color: var(--text3); }
  .diff-box { margin: 4px 0; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 8px; font-size: 10px; }
  .diff-lbl { font-size: 8.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .diff-val { font-family: var(--mono); word-break: break-all; line-height: 1.5; }

  /* ── Notices ── */
  .notice { padding: 8px 10px; border-radius: var(--r-sm); font-size: 11px; line-height: 1.5; margin-bottom: 8px; border: 1px solid transparent; }
  .notice-err  { background: var(--er-bg); border-color: var(--er-b); color: var(--er); }
  .notice-info { background: var(--accent-d); border-color: var(--accent-d2); color: var(--accent-t); }
  .notice-warn { background: var(--wa-bg); border-color: var(--wa-b); color: var(--wa); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 12px; line-height: 1.8; }

  /* ── Coming soon ── */
  .coming-soon { text-align: center; padding: 40px 20px; color: var(--text3); }
  .coming-soon .cs-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; margin: 0 auto 12px; }
  .coming-soon h3 { font-size: 13px; color: var(--text2); font-weight: 500; margin-bottom: 5px; }
  .coming-soon p  { font-size: 11px; line-height: 1.6; max-width: 240px; margin: 0 auto; }


  /* ── Identity Sync tab ── */
  .id-call { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 7px; box-shadow: var(--shadow); overflow: hidden; }
  .id-call:last-child { margin-bottom: 0; }
  .id-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; cursor: pointer; transition: background .1s; }
  .id-head:hover { background: var(--bg3); }
  .id-head-left  { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
  .id-head-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .id-path { display: flex; align-items: center; gap: 4px; overflow: hidden; }
  .id-seg { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .id-seg-site { background: var(--accent-d); color: var(--accent-t); }
  .id-seg-vid  { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .id-dur  { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .id-time { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .id-chev { font-size: 10px; color: var(--text3); transition: transform .18s; }
  .id-body { display: none; border-top: 1px solid var(--border); }
  .id-body.open { display: block; }
  .id-url  { font-family: var(--mono); font-size: 9.5px; color: var(--text3); padding: 6px 10px; background: var(--bg2); border-bottom: 1px solid var(--border); word-break: break-all; line-height: 1.5; }
  .id-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .id-th  { text-align: left; padding: 5px 10px; font-size: 10px; font-weight: 500; color: var(--text3); background: var(--bg2); border-bottom: 1px solid var(--border); }
  .id-th:first-child { width: 35%; }
  .id-row td { border-bottom: 1px solid var(--border); vertical-align: top; }
  .id-row:last-child td { border-bottom: none; }
  .id-key { padding: 6px 10px; font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--text2); width: 35%; }
  .id-val { padding: 6px 10px; font-family: var(--mono); font-size: 10px; color: var(--text); word-break: break-all; line-height: 1.5; }



  /* ── dataLayer source banner ── */
  .dl-source-banner { display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:var(--r-sm); margin-bottom:10px; border:1px solid transparent; }
  .dl-source-banner.source-window { background:var(--accent-d); border-color:var(--accent-d2); }
  .dl-source-banner.source-url    { background:var(--ok-bg);    border-color:var(--ok-b); }
  .dl-source-icon  { font-size:18px; line-height:1; flex-shrink:0; }
  .dl-source-title { font-size:9.5px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; font-weight:500; margin-bottom:2px; }
  .dl-source-value { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--accent-t); }
  .source-url .dl-source-value { color:var(--ok); }

  /* ── Traffic Source tab ── */
  .ts-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .ts-th { text-align: left; padding: 5px 10px; font-size: 10px; font-weight: 500; color: var(--text3); background: var(--bg2); border-bottom: 1px solid var(--border); }
  .ts-th:first-child { width: 40%; }
  .ts-table tbody tr { border-bottom: 1px solid var(--border); }
  .ts-table tbody tr:last-child { border-bottom: none; }
  .ts-key { padding: 6px 10px; font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--text2); vertical-align: top; width: 40%; }
  .ts-val { padding: 6px 10px; font-family: var(--mono); font-size: 10px; color: var(--text); word-break: break-all; line-height: 1.5; vertical-align: top; }
  .ts-empty-row { padding: 10px; color: var(--text3); font-size: 11px; text-align: center; }
  .ts-referer-val { font-family: var(--mono); font-size: 10px; color: var(--text2); word-break: break-all; line-height: 1.6; padding: 2px 0; }

  /* ── etuix visitor-ID strip ── */
  .etuix-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .etuix-label {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .05em;
    flex-shrink: 0;
  }
  .etuix-val {
    font-family: var(--mono); font-size: 10.5px; color: var(--text2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .etuix-val.not-found { color: var(--text3); font-style: italic; }
  .etuix-copy {
    flex-shrink: 0;
    background: transparent; border: 1px solid var(--border2);
    color: var(--text3); border-radius: 3px;
    padding: 1px 6px; font-size: 10px; cursor: pointer;
    transition: background .1s;
  }
  .etuix-copy:hover { background: var(--bg4); color: var(--text2); }
  .etuix-copy.hidden { display: none; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><img src="icons/icon48.png" alt="Eulerian"></div>
    <div>
      <div class="header-name">Eulerian Marketing Platform Chrome DevTools</div>
      <div class="header-ver">v1.2.0</div>
    </div>
    <div class="site-pill" id="siteBadge">—</div>
  </div>

  <div class="etuix-bar" id="etuixBar">
    <span class="etuix-label">etuix</span>
    <span class="etuix-val not-found" id="etuixVal">—</span>
    <button class="etuix-copy hidden" id="etuixCopy" title="Copy etuix value">Copy</button>
