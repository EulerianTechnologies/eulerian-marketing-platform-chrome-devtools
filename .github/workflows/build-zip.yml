name: Build Chrome Extension ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove unnecessary files
        run: |
          rm -rf .git
          rm -rf node_modules
          rm -rf .github
          rm -f *.zip

      - name: Create ZIP
        run: |
          zip -r eulerian-marketing-platform-chrome-devtools.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".github/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eulerian-marketing-platform-chrome-devtools 
          path: eulerian-marketing-platform-chrome-devtools.zip
