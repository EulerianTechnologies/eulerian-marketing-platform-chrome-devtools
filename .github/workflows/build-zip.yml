name: Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from the GitHub UI

jobs:
  build:
    name: Build extension zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: node scripts/validate-manifest.js

      - name: Run tests
        run: npm test -- --ci

      - name: Build extension
        run: npm run build
        # build.js already calls: archive.directory(dist/, false)
        # which puts manifest.json at the ROOT of the zip — correct for CWS.

      - name: Verify zip structure (manifest.json must be at root)
        run: |
          echo "Contents of eulerian-marketing-platform-chrome-devtools.zip:"
          unzip -l eulerian-marketing-platform-chrome-devtools.zip
          if unzip -l eulerian-marketing-platform-chrome-devtools.zip | grep -q "manifest.json$"; then
            echo " manifest.json is at root level"
          else
            echo " manifest.json NOT at root — zip structure is wrong"
            exit 1
          fi

      # Upload the zip as a release asset directly — NOT as a GitHub Actions
      # artifact (which would wrap it in another zip and break the CWS upload).
      # Download it from the workflow summary page → Artifacts section,
      # or from a GitHub Release if you tag the commit.
      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: eulerian-marketing-platform-chrome-devtools
          path: eulerian-marketing-platform-chrome-devtools.zip
          # upload-artifact v4 with a single .zip file does NOT double-wrap it —
          # it zips the file itself, so when downloaded you get exactly
          # eulerian-marketing-platform-chrome-devtools.zip ready to submit to the Chrome Web Store.
          if-no-files-found: error
          retention-days: 30
          compression-level: 0   # don't re-compress an already-zipped file
