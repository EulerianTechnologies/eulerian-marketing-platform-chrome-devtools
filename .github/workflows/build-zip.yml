name: Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build extension zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: node scripts/validate-manifest.js

      - name: Run tests
        run: npm test -- --ci

      - name: Build extension
        run: npm run build

      - name: Verify zip structure (manifest.json must be at root)
        run: |
          echo "Contents of eulerian-marketing-platform-chrome-devtools.zip:"
          unzip -l eulerian-marketing-platform-chrome-devtools.zip
          if unzip -l eulerian-marketing-platform-chrome-devtools.zip | grep -q "manifest.json$"; then
            echo "manifest.json is at root level"
          else
            echo " manifest.json NOT at root — zip structure is wrong"
            exit 1
          fi

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: eulerian-marketing-platform-chrome-devtools
          path: eulerian-marketing-platform-chrome-devtools.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
